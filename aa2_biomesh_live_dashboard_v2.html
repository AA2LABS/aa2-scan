function hex2rgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return `rgba(${r},${g},${b},${a})`;}

function renderF(p,idx,labels){
  return `<div class="pcard" style="border-color:${hex2rgba(p.col,.2)};background:${hex2rgba(p.col,.04)}">
    <div class="ch-hdr">
      <div><div class="pname">${p.name}</div><div class="prole">${p.sub}</div></div>
      <span class="badge" style="background:${hex2rgba(p.bc,.15)};color:${p.bc}">${p.badge}</span>
    </div>
    <div class="live-r"><div class="ldot" style="background:${p.col}"></div>LIVE · HR ${p.hr} bpm</div>
    <div class="ekg-wrap" style="background:${hex2rgba(p.col,.06)}">
      <canvas id="ek-f${idx}" data-col="${p.col}" data-sp="${p.sp}" data-amp="${p.amp}" width="280" height="50" style="width:100%;height:50px"></canvas>
    </div>
    <div class="eq-row" id="eq-f${idx}">
      ${p.bands.map((v)=>`<div class="eq-bar" style="height:${v}%;background:${p.col};opacity:.75" data-t="${v}"></div>`).join('')}
    </div>
    <div class="eq-labels">${labels.map(l=>`<div class="eql">${l}</div>`).join('')}</div>
  </div>`;
}

function renderCmd(c){
  const noCmd=c.name.startsWith('No');
  return `<div class="cmd-card" style="border-color:${hex2rgba(c.col,.25)};background:${hex2rgba(c.col,.04)}">

    </div>
    ${noCmd?'':`<div class="live-r"><div class="ldot" style="background:${c.col}"></div>LIVE · Master bus active</div>
    <div class="ekg-wrap" style="background:${hex2rgba(c.col,.06)}">
      <canvas id="ek-cmd" data-col="${c.col}" data-sp="${c.sp}" data-amp="${c.amp}" width="560" height="38" style="width:100%;height:38px"></canvas>
    </div>`}
    <div class="channels">${c.channels.map(ch=>`<div class="ch" style="border-color:${hex2rgba(ch.c,.25)};background:${hex2rgba(ch.c,.05)}"><div class="ch-dot" style="background:${ch.c}"></div>${ch.l}</div>`).join('')}</div>
  </div>`;
}

function renderTeam(members){

    <div class="tn">${m.name}</div>

}

function renderTab(key){
  const d=D[key];
  document.getElementById('tier').textContent=d.tier;
  document.getElementById('drivers').innerHTML=d.feat.map((p,i)=>renderF(p,i,d.eql)).join('');
  document.getElementById('cmd').innerHTML=renderCmd(d.cmd);
  document.getElementById('tgrid').innerHTML=renderTeam(d.team);
  startAnim();
}

function startAnim(){
  if(rafId)cancelAnimationFrame(rafId);
  eqIvls.forEach(id=>clearInterval(id));
  ekgIs=[]; eqIvls=[];
  document.querySelectorAll('canvas[data-col]').forEach(canvas=>{
    const sp=parseFloat(canvas.dataset.sp);
    const amp=parseFloat(canvas.dataset.amp);
    const col=canvas.dataset.col;
    if(sp>0) ekgIs.push({canvas,ctx:canvas.getContext('2d'),offset:Math.random()*130,sp,amp,col});
  });
  document.querySelectorAll('.eq-row').forEach(row=>{
    const bars=[...row.querySelectorAll('.eq-bar')];
    const ivl=setInterval(()=>{
      bars.forEach(bar=>{
        const cur=parseFloat(bar.style.height)||50;
        const tgt=15+Math.random()*78;
        bar.style.height=(cur+(tgt-cur)*0.1)+'%';
      });
    },400);
    eqIvls.push(ivl);
  });
  function tick(){
    ekgIs.forEach(inst=>{
      const{canvas,ctx,offset,sp,amp,col}=inst;
      const W=canvas.width,H=canvas.height,mid=H/2,CL=130;
      ctx.clearRect(0,0,W,H);
      ctx.beginPath();ctx.strokeStyle=col;ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.lineCap='round';
      for(let x=0;x<W;x++){const t=((x+inst.offset)%CL)/CL;const y=mid-ekgY(t)*amp;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
      ctx.stroke();
      const tipT=((W-1+inst.offset)%CL)/CL;const tipY=mid-ekgY(tipT)*amp;
      ctx.beginPath();ctx.arc(W-1,tipY,2,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      inst.offset+=sp;
    });
    rafId=requestAnimationFrame(tick);
  }
  tick();
}

function initTabs(){
  document.getElementById('tabs').innerHTML=TABS.map(t=>`<button class="tab${t.k==='ferrari'?' active':''}" data-k="${t.k}" onclick="switchTab('${t.k}')" style="${t.k==='ferrari'?`background:${t.color};color:#fff;border-color:${t.color}`:''}"> ${t.label}</button>`).join('');
}

function switchTab(key){
  active=key;
  document.querySelectorAll('.tab').forEach(b=>{
    const on=b.dataset.k===key;
    b.classList.toggle('active',on);
    const col=TABS.find(t=>t.k===key).color;
    b.style.background=on?col:'';b.style.color=on?'#fff':'';b.style.borderColor=on?col:'';
  });
  renderTab(key);
}

initTabs();
renderTab('ferrari');
