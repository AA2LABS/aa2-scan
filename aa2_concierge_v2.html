<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#111;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,sans-serif}
.phone{width:320px;height:640px;border-radius:44px;overflow:hidden;position:relative;border:8px solid #0a0a0a;background:#000;box-shadow:0 30px 80px rgba(0,0,0,0.8)}

/* Photo fills top portion, full image visible */
.bg-wrap{position:absolute;top:0;left:0;right:0;height:65%;background:#0a0a0a;overflow:hidden}
.bg{width:100%;height:100%;object-fit:contain;object-position:center center;display:block}

/* dark fill below photo to tie into panel */
.bg-fill{position:absolute;top:65%;left:0;right:0;bottom:0;background:#060606}

/* gradient bridges photo into panel */
.fade{position:absolute;top:45%;left:0;right:0;height:30%;background:linear-gradient(to bottom,transparent,#060606)}

.panel{position:absolute;bottom:0;left:0;right:0;padding:0 14px 16px}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:10px}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.2)}
.dot.on{width:18px;border-radius:3px;background:#fff}
.card{background:rgba(6,6,6,0.95);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:16px 14px 14px}
.tag{font-size:9px;letter-spacing:2.5px;text-transform:uppercase;margin-bottom:5px;font-family:monospace;color:#d4a84b}
.iname{font-size:26px;font-weight:700;color:#fff;letter-spacing:-0.5px;margin-bottom:2px}
.irole{font-size:11px;color:rgba(255,255,255,0.45);margin-bottom:13px}
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:13px}
.cw{border-radius:10px;padding:9px 10px;border:1px solid rgba(255,255,255,0.06)}
.wo{background:rgba(255,255,255,0.03)}
.wi{background:rgba(255,255,255,0.07)}
.cl{font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,0.28);margin-bottom:4px}
.ct{font-size:10.5px;color:rgba(255,255,255,0.72);line-height:1.5}
.btns{display:flex;gap:8px}
.bn{flex:1;border:none;border-radius:10px;padding:12px;font-size:13px;font-weight:700;cursor:pointer;background:#d4a84b;color:#1a0900}
.bs{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);border:none;border-radius:10px;padding:12px 14px;font-size:12px;cursor:pointer}
</style>
</head>
